version: '3.8'

services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=GLMSAdmin@2026!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P GLMSAdmin@2026! -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: ..
      dockerfile: GLMS.API/Dockerfile
    container_name: glms-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sql-server-db,1433;Database=GLMSDB;User Id=sa;Password=GLMSAdmin@2026!;TrustServerCertificate=True;Encrypt=False;
      - JwtSettings__SecretKey=TechMoveGLMS2026SuperSecretKeyForJWT!
      - JwtSettings__Issuer=GLMS.API
      - JwtSettings__Audience=GLMS.Web
      - JwtSettings__ExpiryHours=8
    ports:
      - "5001:80"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: on-failure

  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glms-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ApiSettings__BaseUrl=http://glms-backend-api:80
    ports:
      - "5000:80"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network
    restart: on-failure

networks:
  glms-network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local